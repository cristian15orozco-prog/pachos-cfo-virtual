services:
  - type: web
    name: pachos-cfo-virtual-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.17.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 365d
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: PLAID_CLIENT_ID
        value: ""
      - key: PLAID_SECRET
        value: ""
      - key: PLAID_ENV
        value: sandbox
      - key: PLAID_PRODUCTS
        value: transactions,auth
      - key: PLAID_COUNTRY_CODES
        value: US
      - key: SEED_OWNER_EMAIL
        sync: false
      - key: SEED_OWNER_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
